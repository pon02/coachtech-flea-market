server {
    listen 80;
    index index.php index.html;
    server_name localhost;

    # Allow requests large enough for Laravel validation to handle uploads.
    # If this is too small, Nginx returns 413 before the request reaches PHP.
    # Keep it close to app-level validation limits to avoid unnecessary large uploads.
    client_max_body_size 3M;

    root /var/www/public;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}